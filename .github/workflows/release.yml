name: Publish to GitHub Packages

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

permissions:
  contents: write
  packages: write
  id-token: write


jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Grant execute permission for Gradle
        run: chmod +x gradlew
      - name: Build Minecraft Plugin
        run: ./gradlew build
      - uses: actions/upload-artifact@v7
        with:
          name: XHappySpeed.jar
          archive: 'false'
          path: 'build/libs/XHappySpeed-*-all.jar'
      - uses: softprops/action-gh-release@v2
        with:
          token: '${{ github.token }}'
          tag_name: ${{ github.run_id }}
          body: |
            Automated Release for the XHappySpeed Minecraft Plugin.
          files: "build/libs/XHappySpeed-*-all.jar"